version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: link_platform_db
    environment:
      POSTGRES_USER: linkuser
      POSTGRES_PASSWORD: linkpassword
      POSTGRES_DB: linkdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U linkuser -d linkdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: link_platform_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

volumes:
  postgres_data:
  redis_data:
